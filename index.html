<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Drift - 粒子引力畫布 v2.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>

    <div id="landing-page">
        <div class="landing-card">
            <div class="landing-badge">SYSTEM INITIALIZATION</div>
            <h1>Cosmic Drift v2.0</h1>
            <p class="subtitle">數位生成藝術 ‧ 互動幾何粒子星空</p>
            
            <div class="instructions">
                <h3><span class="icon">💡</span> 操作手冊</h3>
                <ul>
                    <li><strong>左側控制面版：</strong> 調整粒子數量 (Density)、引力強度與殘影時間 (Trail)。</li>
                    <li><strong>點擊右側畫布：</strong> 部署「量子重力點」，粒子將受引力吸引並環繞旋轉。</li>
                    <li><strong>多維主題切換：</strong> 切換 Cosmic Drift、Solar Flare 等三種不同星雲配色。</li>
                </ul>
            </div>
            
            <button id="start-btn">啟動量子星空</button>
        </div>
    </div>

    <div id="ui-overlay">
        <div id="control-panel">
            <div class="panel-header">
                <h2>GIT_0612 Project | v2.0</h2>
                <div class="badge">Canvas: Active</div>
            </div>

            <div class="menu-items">
                <button class="menu-btn active"><i class="icon">✨</i> Particle Systems</button>
                <button class="menu-btn"><i class="icon">🎨</i> Color Palettes</button>
                <button class="menu-btn"><i class="icon">⚙️</i> Behaviors</button>
                <button class="menu-btn"><i class="icon">🔮</i> Advanced Effects</button>
            </div>

            <div class="divider"></div>

            <div class="controls">
                <div class="control-group">
                    <label for="themeSelect">Color Theme</label>
                    <select id="themeSelect">
                        <option value="cosmic">Cyberpunk (桃紅/青藍/紫)</option>
                        <option value="solar">Neon Ocean (深藍/冰藍/白)</option>
                        <option value="aurora">Acid Lime (螢光綠/黃/暗紫)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>
                        <span>Density</span>
                        <span id="densityVal" class="val-display">300</span>
                    </label>
                    <input type="range" id="densitySlider" min="50" max="1000" step="10" value="300">
                </div>

                <div class="control-group">
                    <label>
                        <span>Attraction Force</span>
                        <span id="attractionVal" class="val-display">0.5</span>
                    </label>
                    <input type="range" id="attractionSlider" min="0" max="5" step="0.1" value="0.5">
                </div>

                <div class="control-group">
                    <label>
                        <span>Color Shift Speed</span>
                        <span id="colorSpeedVal" class="val-display">1.40</span>
                    </label>
                    <input type="range" id="colorSpeedSlider" min="0.1" max="5.0" step="0.1" value="1.4">
                </div>

                <div class="control-group">
                    <label>
                        <span>Trail Duration</span>
                        <span id="trailVal" class="val-display">0.85</span>
                    </label>
                    <input type="range" id="trailSlider" min="0" max="0.99" step="0.01" value="0.85">
                </div>
                
                <button id="resetBtn">Reset Gravity</button>
            </div>
            
            <div id="status">Ready</div>
        </div>
        
        <div id="canvas-tip">
            <p>Click anywhere to create a Gravity Point</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
