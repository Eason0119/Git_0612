<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動星空畫布</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
</head>
<body>

    <div id="landing-page">
        <div class="card">
            <h1>數位星空互動畫布</h1>
            <p class="subtitle">這是一個結合 p5.js 的動態生成藝術空間</p>
            
            <div class="instructions">
                <h3>💡 如何互動？</h3>
                <ul>
                    <li><strong>移動滑鼠：</strong> 引力場會吸引周圍的星體粒子。</li>
                    <li><strong>點擊滑鼠：</strong> 在當前位置爆炸發射出一批新粒子。</li>
                    <li><strong>按下鍵盤任意鍵：</strong> 切換粒子星空的顏色主題。</li>
                </ul>
            </div>
            
            <button id="start-btn">進入星空</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
